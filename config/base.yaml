defaults:
  - user: single_user
  - transforms: log_spectrogram
  # - model: tds_conv_ctc
  - model: cnn_tcn_bilstm_ctc

  - optimizer: adam
  - lr_scheduler: linear_warmup_cosine_annealing
  - decoder: ctc_greedy
  - cluster: local
  - _self_

seed: 1501
batch_size: 32
num_workers: 4
train: True
checkpoint: null
monitor_metric: val/CER
monitor_mode: min

trainer:
  accelerator: gpu
  devices: 1
  num_nodes: 1
  max_epochs: 80
  default_root_dir: ${hydra:runtime.output_dir}

callbacks:
  - _target_: pytorch_lightning.callbacks.LearningRateMonitor
  - _target_: pytorch_lightning.callbacks.ModelCheckpoint
    dirpath: ${hydra:runtime.output_dir}/checkpoints
    monitor: ${monitor_metric}
    mode: ${monitor_mode}
    save_last: True
    verbose: True
  - _target_: pytorch_lightning.callbacks.EarlyStopping
    monitor: ${monitor_metric}
    mode: ${monitor_mode}
    # patience: 6
    patience: 50
    min_delta: 0.1
    verbose: true

dataset:
  root: ${hydra:runtime.cwd}/data

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000
  padding: [1800, 200]
  batch_size: ${batch_size}
  num_workers: ${num_workers}
  train_sessions: ${dataset.train}
  val_sessions: ${dataset.val}
  test_sessions: ${dataset.test}
  train_transform:
    _target_: emg2qwerty.transforms.Compose
    transforms: ${transforms.train}
  val_transform:
    _target_: emg2qwerty.transforms.Compose
    transforms: ${transforms.val}
  test_transform:
    _target_: emg2qwerty.transforms.Compose
    transforms: ${transforms.test}

hydra:
  run:
    dir: logs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${hydra.run.dir}
    subdir: job${hydra.job.num}_${hydra.job.override_dirname}
  output_subdir: hydra_configs
  job:
    name: emg2qwerty
    config:
      override_dirname:
        exclude_keys:
          - checkpoint
          - cluster
          - trainer.accelerator